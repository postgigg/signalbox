<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1270" height="760" fill="#0A0A0A"/>

  <!-- Angled accent lines -->
  <line x1="920" y1="0" x2="860" y2="760" stroke="#E8E4DF" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="1020" y1="0" x2="960" y2="760" stroke="#E8E4DF" stroke-opacity="0.02" stroke-width="1"/>
  <line x1="1120" y1="0" x2="1060" y2="760" stroke="#E8E4DF" stroke-opacity="0.015" stroke-width="1"/>

  <!-- Large watermark logo mark -->
  <g transform="translate(780, 100)" opacity="0.025">
    <path d="M0 260 L140 0 L140 520 Z" fill="#E8E4DF"/>
    <path d="M60 260 L180 40 L180 480 Z" fill="#E8E4DF"/>
    <path d="M120 260 L220 80 L220 440 Z" fill="#E8E4DF"/>
  </g>

  <!-- Launch badge -->
  <rect x="88" y="80" width="180" height="28" rx="3" fill="#141210" stroke="#1e1c18" stroke-width="1"/>
  <rect x="100" y="90" width="8" height="8" rx="1" fill="#DA552F"/>
  <text x="116" y="99" font-family="'DM Mono', monospace" font-size="10" fill="#7a7570" letter-spacing="0.8">LAUNCHING NOW</text>

  <!-- Logo mark -->
  <g transform="translate(88, 132)">
    <path d="M0 24 L10 4 L10 44 Z" fill="#E8E4DF" opacity="0.12"/>
    <path d="M6 24 L14 8 L14 40 Z" fill="#E8E4DF" opacity="0.35"/>
    <path d="M12 24 L20 12 L20 36 Z" fill="#E8E4DF"/>
    <circle cx="6" cy="24" r="1.5" fill="#E8E4DF"/>
  </g>
  <!-- Wordmark -->
  <text x="138" y="163" font-family="'DM Sans', sans-serif" font-size="28" font-weight="700" fill="#E8E4DF" letter-spacing="-1.2">HawkLeads</text>

  <!-- Headline -->
  <text font-family="'DM Sans', sans-serif" font-size="58" font-weight="700" fill="#E8E4DF" letter-spacing="-2.5">
    <tspan x="88" y="260">The smart widget that</tspan>
    <tspan x="88" y="322">scores your leads</tspan>
  </text>
  <text x="88" y="384" font-family="'DM Sans', sans-serif" font-size="58" font-weight="700" font-style="italic" fill="#DA552F" letter-spacing="-2.5">before you see them.</text>

  <!-- Subheadline -->
  <text font-family="'DM Sans', sans-serif" font-size="17" fill="#7a7570" letter-spacing="0">
    <tspan x="88" y="432">Embed on any site. Visitors answer qualifying questions.</tspan>
    <tspan x="88" y="458">Every lead gets a three-dimensional score and lands in</tspan>
    <tspan x="88" y="484">your inbox ranked by who to call first.</tspan>
  </text>

  <!-- CTA Button -->
  <rect x="88" y="520" width="200" height="48" rx="4" fill="#E8E4DF"/>
  <text x="132" y="550" font-family="'DM Sans', sans-serif" font-size="15" font-weight="600" fill="#0A0A0A" letter-spacing="-0.2">Start Free Trial</text>
  <path d="M260 544 l8 0 M264 540 l4 4 l-4 4" stroke="#0A0A0A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Secondary CTA -->
  <text x="312" y="550" font-family="'DM Sans', sans-serif" font-size="14" font-weight="500" fill="#7a7570">View demo</text>
  <line x1="312" y1="556" x2="380" y2="556" stroke="#1e1c18" stroke-width="1"/>

  <!-- Feature chips -->
  <!-- Chip 1 -->
  <rect x="88" y="600" width="265" height="32" fill="#141210" stroke="none"/>
  <rect x="88" y="600" width="2" height="32" fill="#1e1c18"/>
  <text x="100" y="621" font-family="'DM Mono', monospace" font-size="10" letter-spacing="0.3">
    <tspan fill="#E8E4DF" font-weight="500">3D Scoring</tspan>
    <tspan fill="#4a4540"> — form + behavior + intent</tspan>
  </text>

  <!-- Chip 2 -->
  <rect x="363" y="600" width="195" height="32" fill="#141210" stroke="none"/>
  <rect x="363" y="600" width="2" height="32" fill="#1e1c18"/>
  <text x="375" y="621" font-family="'DM Mono', monospace" font-size="10" letter-spacing="0.3">
    <tspan fill="#E8E4DF" font-weight="500">6 Routing Strategies</tspan>
  </text>

  <!-- Chip 3 -->
  <rect x="568" y="600" width="160" height="32" fill="#141210" stroke="none"/>
  <rect x="568" y="600" width="2" height="32" fill="#1e1c18"/>
  <text x="580" y="621" font-family="'DM Mono', monospace" font-size="10" letter-spacing="0.3">
    <tspan fill="#E8E4DF" font-weight="500">Drip Sequences</tspan>
  </text>

  <!-- Chip 4 -->
  <rect x="738" y="600" width="170" height="32" fill="#141210" stroke="none"/>
  <rect x="738" y="600" width="2" height="32" fill="#1e1c18"/>
  <text x="750" y="621" font-family="'DM Mono', monospace" font-size="10" letter-spacing="0.3">
    <tspan fill="#E8E4DF" font-weight="500">Webhooks + API</tspan>
  </text>

  <!-- Right side: Pipeline flow -->
  <!-- Scoring visual -->
  <g transform="translate(900, 100)">
    <!-- Card background -->
    <rect x="0" y="0" width="300" height="540" fill="#141210" stroke="#1e1c18" stroke-width="1" rx="2"/>

    <!-- Card header -->
    <text x="24" y="36" font-family="'DM Mono', monospace" font-size="9" fill="#7a7570" letter-spacing="1.5">HOW IT WORKS</text>
    <line x1="24" y1="48" x2="276" y2="48" stroke="#1e1c18" stroke-width="1"/>

    <!-- Step 1 -->
    <text x="24" y="80" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB" letter-spacing="1">01</text>
    <text x="48" y="80" font-family="'DM Sans', sans-serif" font-size="15" font-weight="700" fill="#E8E4DF" letter-spacing="-0.3">Capture</text>
    <text x="24" y="100" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">2-5 qualifying questions per widget</text>
    <text x="24" y="116" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">Score weights -50 to +50 per answer</text>
    <text x="24" y="132" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">Bot protection: honeypot + JS challenge</text>

    <!-- Connector -->
    <line x1="150" y1="148" x2="150" y2="168" stroke="#1e1c18" stroke-width="1"/>
    <polygon points="146,168 150,176 154,168" fill="#1e1c18"/>

    <!-- Step 2 -->
    <text x="24" y="200" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB" letter-spacing="1">02</text>
    <text x="48" y="200" font-family="'DM Sans', sans-serif" font-size="15" font-weight="700" fill="#E8E4DF" letter-spacing="-0.3">Score</text>

    <!-- Score bars -->
    <text x="24" y="224" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540">Form</text>
    <rect x="80" y="216" width="140" height="4" fill="#1e1c18" rx="0"/>
    <rect x="80" y="216" width="98" height="4" fill="#2563EB" rx="0"/>
    <text x="234" y="224" font-family="'DM Mono', monospace" font-size="10" fill="#7a7570">60%</text>

    <text x="24" y="246" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540">Behavior</text>
    <rect x="80" y="238" width="140" height="4" fill="#1e1c18" rx="0"/>
    <rect x="80" y="238" width="56" height="4" fill="#16A34A" rx="0"/>
    <text x="234" y="246" font-family="'DM Mono', monospace" font-size="10" fill="#7a7570">20%</text>

    <text x="24" y="268" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540">Intent</text>
    <rect x="80" y="260" width="140" height="4" fill="#1e1c18" rx="0"/>
    <rect x="80" y="260" width="56" height="4" fill="#CA8A04" rx="0"/>
    <text x="234" y="268" font-family="'DM Mono', monospace" font-size="10" fill="#7a7570">20%</text>

    <!-- Connector -->
    <line x1="150" y1="286" x2="150" y2="306" stroke="#1e1c18" stroke-width="1"/>
    <polygon points="146,306 150,314 154,306" fill="#1e1c18"/>

    <!-- Step 3 -->
    <text x="24" y="340" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB" letter-spacing="1">03</text>
    <text x="48" y="340" font-family="'DM Sans', sans-serif" font-size="15" font-weight="700" fill="#E8E4DF" letter-spacing="-0.3">Prioritize</text>

    <!-- Tier boxes -->
    <rect x="24" y="356" width="76" height="36" fill="none" stroke="#DC2626" stroke-width="1" stroke-opacity="0.3"/>
    <text x="38" y="370" font-family="'DM Mono', monospace" font-size="10" fill="#DC2626" letter-spacing="0.5">HOT</text>
    <text x="38" y="384" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">70-100</text>

    <rect x="112" y="356" width="76" height="36" fill="none" stroke="#CA8A04" stroke-width="1" stroke-opacity="0.3"/>
    <text x="122" y="370" font-family="'DM Mono', monospace" font-size="10" fill="#CA8A04" letter-spacing="0.5">WARM</text>
    <text x="122" y="384" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">40-69</text>

    <rect x="200" y="356" width="76" height="36" fill="none" stroke="#E8E4DF" stroke-width="1" stroke-opacity="0.1"/>
    <text x="212" y="370" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540" letter-spacing="0.5">COLD</text>
    <text x="212" y="384" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">0-39</text>

    <!-- Connector -->
    <line x1="150" y1="408" x2="150" y2="428" stroke="#1e1c18" stroke-width="1"/>
    <polygon points="146,428 150,436 154,428" fill="#1e1c18"/>

    <!-- Step 4 -->
    <text x="24" y="460" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB" letter-spacing="1">04</text>
    <text x="48" y="460" font-family="'DM Sans', sans-serif" font-size="15" font-weight="700" fill="#E8E4DF" letter-spacing="-0.3">Automate</text>
    <text x="24" y="482" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">Route to right team member</text>
    <text x="24" y="498" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">Fire email + Slack + webhooks</text>
    <text x="24" y="514" font-family="'DM Sans', sans-serif" font-size="12" fill="#4a4540">Enroll in drip sequence by tier</text>
  </g>

  <!-- Bottom bar -->
  <line x1="0" y1="700" x2="1270" y2="700" stroke="#1e1c18" stroke-width="1"/>
  <text x="88" y="730" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540" letter-spacing="1">HAWKLEADS.IO</text>
  <text x="1182" y="730" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540" letter-spacing="0.5">14-day free trial</text>

  <!-- Accent line at very top -->
  <rect x="0" y="0" width="1270" height="3" fill="#DA552F"/>
</svg>
