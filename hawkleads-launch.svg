<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,700&amp;family=DM+Mono:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1270" height="760" fill="#0A0A0A"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1270" height="3" fill="#DA552F"/>

  <!-- Giant background mark — the brand presence -->
  <g transform="translate(540, 60)" opacity="0.035">
    <path d="M0 340 L190 0 L190 680 Z" fill="#E8E4DF"/>
    <path d="M80 340 L240 40 L240 640 Z" fill="#E8E4DF"/>
    <path d="M160 340 L290 100 L290 580 Z" fill="#E8E4DF"/>
  </g>

  <!-- Subtle angled lines echoing chevron -->
  <line x1="1050" y1="0" x2="980" y2="760" stroke="#E8E4DF" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="1150" y1="0" x2="1080" y2="760" stroke="#E8E4DF" stroke-opacity="0.015" stroke-width="1"/>

  <!-- Logo mark + wordmark centered top -->
  <g transform="translate(535, 60)">
    <path d="M0 20 L8.5 3 L8.5 37 Z" fill="#E8E4DF" opacity="0.12"/>
    <path d="M5 20 L12 7 L12 33 Z" fill="#E8E4DF" opacity="0.35"/>
    <path d="M10 20 L17 10 L17 30 Z" fill="#E8E4DF"/>
    <circle cx="5" cy="20" r="1.2" fill="#E8E4DF"/>
    <text x="26" y="27" font-family="'DM Sans', sans-serif" font-size="20" font-weight="700" fill="#E8E4DF" letter-spacing="-0.8">HawkLeads</text>
  </g>

  <!-- ═══════ HERO: Center-dominant layout ═══════ -->

  <!-- Main headline — massive, centered -->
  <text text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700" fill="#E8E4DF" letter-spacing="-3.5">
    <tspan x="635" y="230" font-size="76">Your best leads</tspan>
    <tspan x="635" y="316" font-size="76">are slipping away.</tspan>
  </text>

  <!-- Accent subline -->
  <text x="635" y="380" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="32" font-weight="700" font-style="italic" fill="#DA552F" letter-spacing="-1">
    Catch them before your competitor does.
  </text>

  <!-- One-line value prop -->
  <text x="635" y="428" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" fill="#7a7570" letter-spacing="0">
    Score every lead in three dimensions. Route hot ones to your closers in seconds.
  </text>

  <!-- CTA button — centered -->
  <rect x="520" y="468" width="230" height="52" rx="4" fill="#E8E4DF"/>
  <text x="635" y="500" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" letter-spacing="-0.3">Start Free Trial</text>

  <text x="635" y="542" text-anchor="middle" font-family="'DM Mono', monospace" font-size="11" fill="#4a4540">No credit card. 14-day trial. Cancel anytime.</text>

  <!-- ═══════ BOTTOM: Visual proof strip ═══════ -->

  <!-- Divider line -->
  <line x1="88" y1="580" x2="1182" y2="580" stroke="#1e1c18" stroke-width="1"/>

  <!-- Three visual proof blocks -->

  <!-- Block 1: Score visualization -->
  <g transform="translate(88, 608)">
    <text x="0" y="14" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB" letter-spacing="1.5">SCORE</text>
    <!-- Score bars -->
    <rect x="0" y="28" width="280" height="3" fill="#1e1c18"/>
    <rect x="0" y="28" width="168" height="3" fill="#2563EB"/>
    <text x="180" y="34" font-family="'DM Mono', monospace" font-size="9" fill="#4a4540">Form 60%</text>

    <rect x="0" y="42" width="280" height="3" fill="#1e1c18"/>
    <rect x="0" y="42" width="56" height="3" fill="#16A34A"/>
    <text x="68" y="48" font-family="'DM Mono', monospace" font-size="9" fill="#4a4540">Behavior 20%</text>

    <rect x="0" y="56" width="280" height="3" fill="#1e1c18"/>
    <rect x="0" y="56" width="56" height="3" fill="#CA8A04"/>
    <text x="68" y="62" font-family="'DM Mono', monospace" font-size="9" fill="#4a4540">Intent 20%</text>

    <!-- Composite -->
    <rect x="0" y="78" width="280" height="5" fill="#1e1c18"/>
    <rect x="0" y="78" width="216" height="5" fill="#E8E4DF"/>
    <text x="228" y="85" font-family="'DM Mono', monospace" font-size="10" fill="#E8E4DF" font-weight="500">77</text>

    <!-- Tier -->
    <rect x="0" y="100" width="40" height="18" fill="none" stroke="#DC2626" stroke-width="1" stroke-opacity="0.4"/>
    <text x="8" y="113" font-family="'DM Mono', monospace" font-size="9" fill="#DC2626">HOT</text>

    <rect x="50" y="100" width="52" height="18" fill="none" stroke="#CA8A04" stroke-width="1" stroke-opacity="0.2"/>
    <text x="56" y="113" font-family="'DM Mono', monospace" font-size="9" fill="#4a4540">WARM</text>

    <rect x="112" y="100" width="48" height="18" fill="none" stroke="#E8E4DF" stroke-width="1" stroke-opacity="0.06"/>
    <text x="118" y="113" font-family="'DM Mono', monospace" font-size="9" fill="#4a4540">COLD</text>
  </g>

  <!-- Block 2: Route visualization -->
  <g transform="translate(480, 608)">
    <text x="0" y="14" font-family="'DM Mono', monospace" font-size="9" fill="#16A34A" letter-spacing="1.5">ROUTE</text>

    <!-- Flow: Lead → Engine → Rep -->
    <rect x="0" y="30" width="80" height="32" fill="#141210" stroke="#1e1c18" stroke-width="1"/>
    <text x="12" y="44" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">New Lead</text>
    <text x="12" y="56" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Score: 77</text>

    <line x1="88" y1="46" x2="112" y2="46" stroke="#1e1c18" stroke-width="1"/>
    <polygon points="112,43 118,46 112,49" fill="#1e1c18"/>

    <rect x="124" y="30" width="80" height="32" fill="#141210" stroke="#2563EB" stroke-width="1" stroke-opacity="0.3"/>
    <text x="136" y="44" font-family="'DM Mono', monospace" font-size="9" fill="#2563EB">Rules</text>
    <text x="136" y="56" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">6 strategies</text>

    <line x1="212" y1="46" x2="236" y2="46" stroke="#1e1c18" stroke-width="1"/>
    <polygon points="236,43 242,46 236,49" fill="#16A34A"/>

    <rect x="248" y="30" width="80" height="32" fill="#141210" stroke="#16A34A" stroke-width="1" stroke-opacity="0.3"/>
    <text x="260" y="44" font-family="'DM Mono', monospace" font-size="9" fill="#16A34A">Alex K.</text>
    <text x="260" y="56" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Assigned</text>

    <!-- Strategy labels -->
    <text x="0" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Round-Robin</text>
    <text x="72" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Skill</text>
    <text x="104" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Geographic</text>
    <text x="180" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Value</text>
    <text x="220" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Availability</text>
    <text x="296" y="86" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Direct</text>

    <!-- Drip timeline -->
    <text x="0" y="112" font-family="'DM Mono', monospace" font-size="9" fill="#CA8A04" letter-spacing="1.5">NURTURE</text>

    <line x1="0" y1="124" x2="328" y2="124" stroke="#1e1c18" stroke-width="1"/>
    <circle cx="0" cy="124" r="3" fill="#2563EB"/>
    <circle cx="82" cy="124" r="3" fill="#16A34A"/>
    <circle cx="164" cy="124" r="3" fill="#16A34A"/>
    <circle cx="246" cy="124" r="3" fill="#16A34A"/>
    <circle cx="328" cy="124" r="3" fill="#CA8A04"/>

    <text x="0" y="140" font-family="'DM Mono', monospace" font-size="7" fill="#4a4540">Submit</text>
    <text x="68" y="140" font-family="'DM Mono', monospace" font-size="7" fill="#4a4540">Email 1</text>
    <text x="150" y="140" font-family="'DM Mono', monospace" font-size="7" fill="#4a4540">Email 2</text>
    <text x="232" y="140" font-family="'DM Mono', monospace" font-size="7" fill="#4a4540">Email 3</text>
    <text x="312" y="140" font-family="'DM Mono', monospace" font-size="7" fill="#4a4540">Pause</text>
  </g>

  <!-- Block 3: Webhook + connect -->
  <g transform="translate(900, 608)">
    <text x="0" y="14" font-family="'DM Mono', monospace" font-size="9" fill="#DA552F" letter-spacing="1.5">CONNECT</text>

    <!-- Webhook events -->
    <g transform="translate(0, 26)">
      <rect x="0" y="0" width="4" height="4" fill="#16A34A"/>
      <text x="12" y="8" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">submission.created</text>

      <rect x="0" y="16" width="4" height="4" fill="#16A34A"/>
      <text x="12" y="24" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">lead.qualified</text>

      <rect x="0" y="32" width="4" height="4" fill="#16A34A"/>
      <text x="12" y="40" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">lead.converted</text>

      <rect x="0" y="48" width="4" height="4" fill="#16A34A"/>
      <text x="12" y="56" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">lead.score_changed</text>

      <rect x="0" y="64" width="4" height="4" fill="#16A34A"/>
      <text x="12" y="72" font-family="'DM Mono', monospace" font-size="9" fill="#E8E4DF">submission.updated</text>
    </g>

    <!-- HMAC badge -->
    <rect x="0" y="124" width="280" height="20" fill="#141210" stroke="#1e1c18" stroke-width="1"/>
    <text x="10" y="138" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540">Signed with </text>
    <text x="80" y="138" font-family="'DM Mono', monospace" font-size="8" fill="#16A34A" font-weight="500">HMAC-SHA256</text>
    <text x="168" y="138" font-family="'DM Mono', monospace" font-size="8" fill="#4a4540"> + delivery logs + auto-retry</text>
  </g>

  <!-- Bottom bar -->
  <line x1="0" y1="728" x2="1270" y2="728" stroke="#1e1c18" stroke-width="1"/>
  <text x="88" y="748" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540" letter-spacing="1.5">HAWKLEADS.IO</text>

  <text x="635" y="748" text-anchor="middle" font-family="'DM Mono', monospace" font-size="10" fill="#4a4540">$99 / $149 / $249 per month</text>

  <text x="1182" y="748" text-anchor="end" font-family="'DM Mono', monospace" font-size="10" fill="#DA552F" letter-spacing="0.5">LIVE NOW</text>
</svg>
