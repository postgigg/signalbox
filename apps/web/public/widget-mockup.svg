<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
      .font-serif { font-family: 'Newsreader', Georgia, serif; }
      .font-sans { font-family: 'Inter', system-ui, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
    <filter id="shadow-lg" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.12" flood-color="#000"/>
    </filter>
    <filter id="shadow-sm" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08" flood-color="#000"/>
    </filter>
    <filter id="shadow-btn" x="-10%" y="-20%" width="125%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15" flood-color="#000"/>
    </filter>
    <clipPath id="browser-clip">
      <rect x="40" y="30" width="1120" height="660" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#F1F5F9"/>

  <!-- Browser Window -->
  <g>
    <!-- Browser Chrome -->
    <rect x="40" y="30" width="1120" height="660" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

    <!-- Title Bar -->
    <rect x="40" y="30" width="1120" height="44" rx="12" fill="#F8FAFC"/>
    <rect x="40" y="62" width="1120" height="12" fill="#F8FAFC"/>
    <!-- Window buttons -->
    <circle cx="68" cy="52" r="6" fill="#FCA5A5"/>
    <circle cx="88" cy="52" r="6" fill="#FCD34D"/>
    <circle cx="108" cy="52" r="6" fill="#86EFAC"/>
    <!-- URL bar -->
    <rect x="180" y="40" width="500" height="24" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="200" y="57" class="font-sans" font-size="11" fill="#94A3B8">acmeplumbing.com</text>

    <!-- Website Content (clipped) -->
    <g clip-path="url(#browser-clip)">
      <!-- Nav bar -->
      <rect x="40" y="74" width="1120" height="56" fill="#FFFFFF"/>
      <line x1="40" y1="130" x2="1160" y2="130" stroke="#E2E8F0" stroke-width="1"/>
      <text x="80" y="108" class="font-serif" font-size="20" font-weight="600" fill="#0F172A">ACME Plumbing</text>
      <text x="940" y="108" class="font-sans" font-size="13" fill="#64748B">Services</text>
      <text x="1010" y="108" class="font-sans" font-size="13" fill="#64748B">About</text>
      <text x="1060" y="108" class="font-sans" font-size="13" fill="#64748B">Contact</text>

      <!-- Hero section of the fake website -->
      <rect x="40" y="130" width="1120" height="560" fill="#FAFAFA"/>

      <!-- Left side content -->
      <text x="100" y="220" class="font-serif" font-size="38" font-weight="700" fill="#0F172A">Professional Plumbing</text>
      <text x="100" y="265" class="font-serif" font-size="38" font-weight="700" fill="#0F172A">Services You Can Trust</text>
      <text x="100" y="310" class="font-sans" font-size="15" fill="#64748B">Licensed, insured, and ready to help.</text>
      <text x="100" y="332" class="font-sans" font-size="15" fill="#64748B">Serving the greater metro area since 2003.</text>

      <!-- Fake CTA -->
      <rect x="100" y="360" width="160" height="44" rx="6" fill="#0F172A"/>
      <text x="136" y="387" class="font-sans" font-size="14" font-weight="500" fill="#FFFFFF">Get a Quote</text>

      <!-- Fake stats -->
      <text x="100" y="450" class="font-mono" font-size="28" font-weight="700" fill="#0F172A">2,400+</text>
      <text x="100" y="472" class="font-sans" font-size="12" fill="#94A3B8">Jobs Completed</text>
      <text x="260" y="450" class="font-mono" font-size="28" font-weight="700" fill="#0F172A">4.9</text>
      <text x="260" y="472" class="font-sans" font-size="12" fill="#94A3B8">Star Rating</text>
      <text x="380" y="450" class="font-mono" font-size="28" font-weight="700" fill="#0F172A">20+</text>
      <text x="380" y="472" class="font-sans" font-size="12" fill="#94A3B8">Years Experience</text>

      <!-- Dimmed overlay to draw focus to widget -->
      <rect x="40" y="130" width="1120" height="560" fill="#000000" opacity="0.03"/>
    </g>
  </g>

  <!-- SignalBox Widget Panel (foreground, overlaid) -->
  <g filter="url(#shadow-lg)">
    <rect x="720" y="100" width="400" height="530" rx="12" fill="#FFFFFF" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

    <!-- Progress bar -->
    <rect x="720" y="100" width="400" height="4" rx="12" fill="#E2E8F0"/>
    <rect x="720" y="100" width="200" height="4" rx="2" fill="#2563EB"/>

    <!-- Header -->
    <text x="748" y="136" class="font-sans" font-size="11" fill="#94A3B8" letter-spacing="0.5">STEP 2 OF 3</text>
    <!-- Close button -->
    <g transform="translate(1088, 118)">
      <rect x="-12" y="-12" width="24" height="24" rx="4" fill="transparent"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Question -->
    <text x="748" y="178" class="font-sans" font-size="20" font-weight="600" fill="#0F172A">What's your timeline?</text>
    <text x="748" y="200" class="font-sans" font-size="13" fill="#94A3B8">When do you need the work done?</text>

    <!-- Option Cards -->
    <!-- Option 1: Emergency (selected) -->
    <rect x="748" y="224" width="344" height="52" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
    <text x="774" y="246" class="font-sans" font-size="14" fill="#0F172A">&#x26A1;</text>
    <text x="800" y="246" class="font-sans" font-size="14" font-weight="500" fill="#0F172A">Emergency (today)</text>
    <text x="800" y="262" class="font-sans" font-size="11" fill="#64748B">Urgent issue, need help ASAP</text>
    <!-- Checkmark -->
    <circle cx="1068" cy="250" r="10" fill="#2563EB"/>
    <polyline points="1062,250 1066,254 1074,246" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Option 2 -->
    <rect x="748" y="288" width="344" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="774" y="310" class="font-sans" font-size="14" fill="#0F172A">&#x1F4C5;</text>
    <text x="800" y="310" class="font-sans" font-size="14" font-weight="500" fill="#0F172A">This week</text>
    <text x="800" y="326" class="font-sans" font-size="11" fill="#64748B">Flexible but soon</text>

    <!-- Option 3 -->
    <rect x="748" y="352" width="344" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="774" y="374" class="font-sans" font-size="14" fill="#0F172A">&#x1F551;</text>
    <text x="800" y="374" class="font-sans" font-size="14" font-weight="500" fill="#0F172A">Within 2 weeks</text>
    <text x="800" y="390" class="font-sans" font-size="11" fill="#64748B">No rush, just planning ahead</text>

    <!-- Option 4 -->
    <rect x="748" y="416" width="344" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="774" y="438" class="font-sans" font-size="14" fill="#0F172A">&#x1F914;</text>
    <text x="800" y="438" class="font-sans" font-size="14" font-weight="500" fill="#0F172A">Just exploring options</text>
    <text x="800" y="454" class="font-sans" font-size="11" fill="#64748B">Getting quotes, no timeline yet</text>

    <!-- Social proof -->
    <text x="748" y="500" class="font-sans" font-size="11" fill="#94A3B8">&#x1F465; 47 businesses qualified this month</text>

    <!-- Footer -->
    <line x1="748" y1="520" x2="1092" y2="520" stroke="#F1F5F9" stroke-width="1"/>
    <text x="850" y="540" class="font-sans" font-size="10" fill="#CBD5E1" opacity="0.5">Powered by </text>
    <text x="910" y="540" class="font-serif" font-size="10" font-weight="600" fill="#CBD5E1" opacity="0.5">SignalBox</text>
  </g>

  <!-- Floating trigger button (bottom-right of browser) -->
  <g filter="url(#shadow-btn)" transform="translate(1080, 640)">
    <rect x="-70" y="-20" width="140" height="40" rx="8" fill="#0F172A"/>
    <text x="-42" y="-4" class="font-sans" font-size="13" font-weight="500" fill="#FFFFFF">Get Started</text>
    <!-- Arrow icon -->
    <polyline points="42,-6 50,-6 50,2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="38" y1="2" x2="50" y2="-6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Score indicator annotation (floating) -->
  <g filter="url(#shadow-sm)" transform="translate(660, 160)">
    <rect x="-90" y="-18" width="180" height="36" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <circle cx="-68" cy="0" r="12" fill="#FEF2F2"/>
    <text x="-68" y="4" class="font-mono" font-size="9" font-weight="600" fill="#DC2626" text-anchor="middle">85</text>
    <text x="-48" y="4" class="font-sans" font-size="11" font-weight="500" fill="#0F172A">Hot Lead Detected</text>
    <!-- Flame icon approximation -->
    <circle cx="68" cy="0" r="8" fill="#FEF2F2"/>
    <text x="68" y="4" font-size="10" text-anchor="middle">&#x1F525;</text>
  </g>
</svg>
