<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" fill="none">
  <!-- Browser frame -->
  <rect x="0" y="0" width="560" height="400" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="560" height="40" rx="12" fill="#F8FAFC"/>
  <rect x="0" y="28" width="560" height="12" fill="#F8FAFC"/>
  <line x1="0" y1="40" x2="560" y2="40" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Window dots -->
  <circle cx="20" cy="20" r="5" fill="#E2E8F0"/>
  <circle cx="36" cy="20" r="5" fill="#E2E8F0"/>
  <circle cx="52" cy="20" r="5" fill="#E2E8F0"/>

  <!-- URL bar -->
  <rect x="80" y="12" width="200" height="16" rx="4" fill="#E2E8F0"/>
  <text x="110" y="24" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">app.signalbox.io/leads</text>

  <!-- Sidebar -->
  <rect x="0" y="40" width="120" height="360" fill="#F8FAFC"/>
  <rect x="0" y="388" width="120" height="12" rx="0" fill="#F8FAFC"/>
