  <text x="152" y="138" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#DC2626">3</text>

  <rect x="270" y="100" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="282" y="118" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">Warm Leads</text>
  <text x="282" y="138" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#CA8A04">2</text>

  <rect x="400" y="100" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
