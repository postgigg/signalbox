  <circle cx="24" cy="100" r="3" fill="#CBD5E1"/>
  <circle cx="24" cy="124" r="3" fill="#CBD5E1"/>
  <circle cx="24" cy="148" r="3" fill="#CBD5E1"/>

  <!-- Main content area header -->
  <text x="140" y="72" font-family="Georgia, serif" font-size="16" font-weight="600" fill="#0F172A">Today's Leads</text>
  <text x="140" y="88" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8">7 new leads, 3 hot</text>

  <!-- Stats row -->
  <rect x="140" y="100" width="120" height="48" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
