  <line x1="140" y1="236" x2="540" y2="236" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="256" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">James Chen</text>
  <text x="152" y="268" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">jchen@blueoak.dev</text>
  <text x="280" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Full renovation</text>
  <text x="412" y="260" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#0F172A">87</text>
  <rect x="460" y="250" width="36" height="18" rx="9" fill="#FEF2F2"/>
  <text x="469" y="262" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#DC2626">Hot</text>

