  <text x="280" y="304" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Bathroom update</text>
  <text x="412" y="304" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#0F172A">64</text>
  <rect x="460" y="294" width="48" height="18" rx="9" fill="#FEFCE8"/>
  <text x="469" y="306" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#CA8A04">Warm</text>

  <!-- Lead row 4 - Cold -->
  <line x1="140" y1="324" x2="540" y2="324" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="344" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">Mike Reynolds</text>
  <text x="152" y="356" font-family="system-ui, sans-serif" font-size="9" fill="#94A3B8">mike.r@gmail.com</text>
  <text x="280" y="348" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">General inquiry</text>
  <text x="412" y="348" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#0F172A">31</text>
  <rect x="460" y="338" width="40" height="18" rx="9" fill="#F8FAFC"/>
  <text x="469" y="350" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#94A3B8">Cold</text>

  <!-- Lead row 5 - Hot -->
  <line x1="140" y1="368" x2="540" y2="368" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="388" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#0F172A">Laura Kim</text>
  <text x="280" y="388" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">New construction</text>
  <text x="412" y="388" font-family="Georgia, serif" font-size="14" font-weight="700" fill="#0F172A">85</text>
  <rect x="460" y="378" width="36" height="18" rx="9" fill="#FEF2F2"/>
  <text x="469" y="390" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#DC2626">Hot</text>
