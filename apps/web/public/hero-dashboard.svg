  <!-- Sidebar nav items -->
  <rect x="12" y="56" width="96" height="28" rx="6" fill="#EFF6FF"/>
  <text x="36" y="74" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#2563EB">Leads</text>

  <text x="36" y="104" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8">Analytics</text>
